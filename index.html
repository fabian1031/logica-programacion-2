<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css">
    <title>Temperatura</title>
  </head>
  <body>
    <main>
      <h1>Conversor de temperatura</h1>

      <div id="termometro">
        <div id="barraMovimiento"></div>
      </div>

      <input
        id="inputTemperatura"
        type="number"
        placeholder="Escribe temperatura en Celsius"
      />

      <section>
        <article>
          <h2>Kelvin</h2>
          <p id="valorKelvin">--</p>
        </article>

        <article>
          <h2>Fahrenheit</h2>
          <p id="valorFahrenheit">--</p>
        </article>
      </section>

      <p id="resultado"></p>

      <button id="btn">convertir</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
